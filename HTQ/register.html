<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — HTQ 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header>
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">HTQ</a> <span>/ <a
                    href="https://studentbranches.ieee.org/eg-ejust-cs/" target="_blank" rel="noopener noreferrer">IEEE
                    EJUST CS</a></span></div>
        <nav><a href="index.html">Back to Home</a></nav>
    </header>

    <main>
        <div class="form-container">
            <div class="form-header">
                <a href="index.html" class="back-link">← Return Home</a>
                <h2>Contest Registration</h2>
                <p>Stage 1: team details and national IDs. You will receive an email to upload payment later.</p>
            </div>

            <form id="registrationForm" novalidate>
                <div class="form-group">
                    <label for="teamName">Team Name</label>
                    <input type="text" id="teamName" name="teamName" placeholder="Team Name" required />
                </div>

                <div class="form-group">
                    <label for="fullName">Full Name (Team Leader)</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Full Name" required />
                </div>

                <div class="form-group">
                    <label for="email">Email Address (Team Leader)</label>
                    <input type="email" id="email" name="email" placeholder="Name@example.com" required />
                </div>

                <div class="form-group">
                    <label for="university">University</label>
                    <input type="text" id="university" name="university" placeholder="University Name" required />
                </div>

                <div class="form-group">
                    <label for="ieeeMember">IEEE Membership</label>
                    <select id="ieeeMember" name="ieeeMember" required>
                        <option value="no">No</option>
                        <option value="yes">Yes</option>
                    </select>
                </div>

                <div class="form-group membership-id-group" id="membershipIdGroup">
                    <label for="membershipId">IEEE Membership ID</label>
                    <input type="text" id="membershipId" name="membershipId" placeholder="e.g. 12345678" />
                </div>

                <div class="form-group">
                    <label for="csMember">Computer Society Membership</label>
                    <select id="csMember" name="csMember" required>
                        <option value="no">No</option>
                        <option value="yes">Yes</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="teamSize">Number of Team Members</label>
                    <select id="teamSize" name="teamSize" required>
                        <option value="3">3 Members</option>
                        <option value="4">4 Members</option>
                        <option value="5">5 Members</option>
                        <option value="6">6 Members</option>
                    </select>
                </div>

                <div id="memberFields"></div>

                <div class="form-group">
                    <label for="comments">Additional Notes (Optional)</label>
                    <textarea id="comments" name="comments" rows="3" placeholder="Tell us anything else..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Submit Application</button>
            </form>
        </div>
    </main>

    <footer>
        <p>Copyright &copy; 2026 IEEE EJUST CS</p>
        <p>HTQ &mdash; All rights reserved</p>
    </footer>

    <script src="js/htq-config.js"></script>
    <script>
        const commentsBox = document.getElementById('comments');
        commentsBox.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        const ieeeMemberSelect = document.getElementById('ieeeMember');
        const membershipIdGroup = document.getElementById('membershipIdGroup');
        const membershipIdInput = document.getElementById('membershipId');

        ieeeMemberSelect.addEventListener('change', function () {
            if (this.value === 'yes') {
                membershipIdGroup.classList.add('visible');
                membershipIdInput.setAttribute('required', 'required');
            } else {
                membershipIdGroup.classList.remove('visible');
                membershipIdInput.removeAttribute('required');
                membershipIdInput.value = '';
            }
        });

        const teamSizeSelect = document.getElementById('teamSize');
        const memberFields = document.getElementById('memberFields');

        function renderMemberFields() {
            const size = parseInt(teamSizeSelect.value, 10);
            memberFields.innerHTML = '';
            for (let i = 1; i <= size; i++) {
                const nameGroup = document.createElement('div');
                nameGroup.className = 'form-group';
                nameGroup.innerHTML = `
                    <label for="memberName${i}">Member #${i} — Full Name</label>
                    <input type="text" id="memberName${i}" name="memberName${i}" placeholder="Enter Full Name" required />
                `;
                memberFields.appendChild(nameGroup);

                const idGroup = document.createElement('div');
                idGroup.className = 'form-group';
                idGroup.innerHTML = `
                    <label for="nationalId${i}">Member #${i} — National ID Number</label>
                    <input type="text" id="nationalId${i}" name="nationalId${i}" placeholder="Enter National ID" required />
                `;
                memberFields.appendChild(idGroup);
            }
        }

        teamSizeSelect.addEventListener('change', renderMemberFields);
        renderMemberFields();

        function showFancyError(message, element) {
            const error = document.createElement('div');
            error.className = 'fancy-error';
            error.innerText = message;
            document.body.appendChild(error);
            setTimeout(() => error.remove(), 4000);

            if (element) {
                const group = element.closest('.form-group');
                if (group) {
                    group.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    group.classList.remove('error-highlight');
                    void group.offsetWidth;
                    group.classList.add('error-highlight');
                }
            }
        }

        function apiBase() {
            const base = (window.HTQ_CONFIG && window.HTQ_CONFIG.apiBase) || '';
            return String(base).replace(/\/$/, '');
        }

        document.getElementById('registrationForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const requiredFields = this.querySelectorAll('input[required], select[required]');
            for (let field of requiredFields) {
                if (!field.value.trim()) {
                    const label = field.closest('.form-group').querySelector('label').innerText;
                    showFancyError(`Field Required: ${label}`, field);
                    return;
                }
            }

            const teamSize = parseInt(teamSizeSelect.value, 10);
            const members = [];
            for (let i = 1; i <= teamSize; i++) {
                const fn = document.getElementById(`memberName${i}`);
                const nid = document.getElementById(`nationalId${i}`);
                if (!fn.value.trim() || !nid.value.trim()) {
                    showFancyError(`Member #${i}: full name and national ID are required.`, fn);
                    return;
                }
                members.push({ fullName: fn.value.trim(), nationalId: nid.value.trim() });
            }

            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            btn.innerText = 'Transmitting...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            const registration = {
                teamName: document.getElementById('teamName').value.trim(),
                leaderFullName: document.getElementById('fullName').value.trim(),
                leaderEmail: document.getElementById('email').value.trim(),
                university: document.getElementById('university').value.trim(),
                ieeeMember: ieeeMemberSelect.value,
                ieeeMembershipId: membershipIdInput.value.trim(),
                csMember: document.getElementById('csMember').value,
                teamSize,
                comments: document.getElementById('comments').value.trim(),
            };

            const payload = { registration, members };

            try {
                const res = await fetch(`${apiBase()}/submitStage1`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    throw new Error(data.error || res.statusText);
                }
                alert(data.message || 'Registration successful. Check the team leader email for the payment link.');
                this.reset();
                membershipIdGroup.classList.remove('visible');
                membershipIdInput.removeAttribute('required');
                membershipIdInput.value = '';
                renderMemberFields();
            } catch (err) {
                showFancyError(err.message || 'Submission failed', btn);
            } finally {
                btn.innerText = originalText;
                btn.style.opacity = '1';
                btn.disabled = false;
            }
        });
    </script>

</body>

</html>
