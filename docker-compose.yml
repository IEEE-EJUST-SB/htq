# Bridge runs in Docker but uses the host Docker socket to exec into the
# DOMjudge MariaDB container (must be named "mariadb" by default).
#
# Point CTFD_* / DOMJUDGE_* at services reachable from this container.
# Default URLs use host.docker.internal (services published on the host).
# For CTFd/DOMjudge in other containers: see docker-compose.attach.yml + env.example.

services:
  bridge:
    build: .
    image: htq-bridge:latest
    container_name: htq-bridge
    ports:
      - "${BRIDGE_PORT:-5000}:5000"
    environment:
      CTFD_API_URL: ${CTFD_API_URL:-http://host.docker.internal:8000/api/v1}
      CTFD_API_TOKEN: ${CTFD_API_TOKEN:-ctfd_56f30df8543d55021a09f9877e0643cd18bb3873cb4316173cafcf4bd0ca4fd3}
      DOMJUDGE_API_URL: ${DOMJUDGE_API_URL:-http://host.docker.internal/api/v4}
      DOMJUDGE_USER: ${DOMJUDGE_USER:-admin}
      DOMJUDGE_PASS: ${DOMJUDGE_PASS:-Mohamedk@1234}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/bridge.db}
    volumes:
      - htq_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  htq_data:
