# Bridge runs in Docker but uses the host Docker socket to exec into the
# DOMjudge MariaDB container (must be named "mariadb" by default).
#
# API URLs inside the container MUST NOT use localhost (that is this container).
# Defaults: host.docker.internal → CTFd/DOMjudge published on the host (ports 8000, 80).
# Override with BRIDGE_CTFD_API_URL / BRIDGE_DOMJUDGE_API_URL if the bridge joins their Docker network.

services:
  bridge:
    build: .
    image: htq-bridge:latest
    container_name: htq-bridge
    ports:
      - "${BRIDGE_PORT:-5000}:5000"
    environment:
      # Not ${CTFD_API_URL}: .env often has localhost for uvicorn — that breaks inside Docker.
      CTFD_API_URL: ${BRIDGE_CTFD_API_URL:-http://host.docker.internal:8000/api/v1}
      CTFD_API_TOKEN: ${CTFD_API_TOKEN:-}
      DOMJUDGE_API_URL: ${BRIDGE_DOMJUDGE_API_URL:-http://host.docker.internal/api/v4}
      DOMJUDGE_USER: ${DOMJUDGE_USER:-admin}
      DOMJUDGE_PASS: ${DOMJUDGE_PASS:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/bridge.db}
      CTFD_UI_URL: ${CTFD_UI_URL:-http://localhost:8000}
      DOMJUDGE_UI_URL: ${DOMJUDGE_UI_URL:-http://localhost}
    volumes:
      - htq_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  htq_data:
